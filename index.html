<!DOCTYPE html>
<html>
<head>
    <title>Preset Overlays</title>
    <script src="https://runeapps.org/alt1lib.js"></script>
    <style>
        body { background: #1a1a1a; color: #ccc; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #444; padding-bottom: 10px; }
        /* The Settings Cog - Large hit-box */
        .cog-btn { cursor: pointer; color: #dbab09; font-size: 30px; padding: 10px; user-select: none; z-index: 100; }
        #settings-menu { display: none; margin-top: 10px; background: #222; padding: 15px; border-radius: 5px; height: 350px; overflow-y: auto; border: 1px solid #444; }
        .upload-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 8px; align-items: center; }
        input[type="file"] { width: 140px; font-size: 11px; }
        .status { font-size: 11px; color: #888; margin-top: 10px; font-style: italic; }
        .btn-ui { background: #333; color: #dbab09; border: 1px solid #dbab09; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-size: 11px; }
    </style>
</head>
<body>

    <div class="header">
        <strong>Preset Overlays</strong>
        <button class="btn-ui" onclick="toggleSettings()">Open Settings</button>
        <div class="cog-btn" onclick="toggleSettings()">⚙️</div>
    </div>

    <div id="status" class="status">Initializing Search...</div>

    <div id="settings-menu">
        <h3 style="margin-top:0; color:#dbab09;">Icon Manager</h3>
        <div id="inputs"></div>
        <button class="btn-ui" style="width:100%; margin-top:15px;" onclick="toggleSettings()">Save and Close</button>
    </div>

    <script>
        const a1lib = new Alt1lib();
        let presets = JSON.parse(localStorage.getItem("rs_preset_imgs") || "{}");
        let showSettings = false;

        // Generate the 18 slots
        const inputContainer = document.getElementById("inputs");
        for (let i = 1; i <= 18; i++) {
            let div = document.createElement("div");
            div.className = "upload-row";
            div.innerHTML = `<span>#${i}:</span> <input type="file" accept="image/*" onchange="saveImg(${i}, this)">`;
            inputContainer.appendChild(div);
        }

        // Use window scope to ensure the button can see the function
        window.toggleSettings = function() {
            showSettings = !showSettings;
            document.getElementById("settings-menu").style.display = showSettings ? "block" : "none";
        };

        window.saveImg = function(num, input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                presets[num] = e.target.result;
                localStorage.setItem("rs_preset_imgs", JSON.stringify(presets));
                alert("Preset " + num + " Icon Loaded!");
            };
            reader.readAsDataURL(file);
        };

        function mainLoop() {
            if (!window.alt1 || !alt1.permissionPixel) {
                document.getElementById("status").innerText = "Waiting for Alt1 permissions...";
                return;
            }

            let img = a1lib.captureHoldFull();
            
            // Search for the Cog Color #dbab09 with 15% tolerance
            let cog = img.findColor([219, 171, 9], 15);

            if (cog.length > 0) {
                document.getElementById("status").innerText = "Bank Active - Drawing Overlays";
                let anchor = cog[0];

                // Page Detection: Check if Preset 1 or 10 is shown
                // Pixel check at offset (-85, +5) from Cog
                let pagePix = img.getPixel(anchor.x - 85, anchor.y + 5);
                let isPageTwo = (pagePix.r > 180); // White text check
                let offset = isPageTwo ? 10 : 1;

                alt1.overloadOut(); 

                for (let i = 0; i < 9; i++) {
                    let pIdx = offset + i;
                    if (presets[pIdx]) {
                        let col = i % 5;
                        let row = Math.floor(i / 5);
                        let x = anchor.x - 238 + (col * 40);
                        let y = anchor.y - 41 + (row * 40);
                        
                        alt1.overloadImg(presets[pIdx], x, y, 30, 30);
                    }
                }
            } else {
                document.getElementById("status").innerText = "Bank Not Found. Open Presets Tab.";
                alt1.overloadOut();
            }
        }

        // Faster update for better 'snapping'
        setInterval(mainLoop, 300);
    </script>
</body>
</html>
