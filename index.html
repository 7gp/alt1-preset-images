<!DOCTYPE html>
<html>
<head>
    <title>Preset overlays by 7xQuest</title>
    <meta name="alt1config" content="./appconfig.json">
    <script src="https://runeapps.org/alt1lib.js"></script>
    
    <style>
        body { background-color: #1a1a1a; color: #ccc; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 10px; }
        .cog-btn { cursor: pointer; color: #dbab09; font-size: 24px; user-select: none; }
        #install-screen { display: none; padding: 20px; background: #2a0000; border: 1px solid #ff4444; border-radius: 5px; margin-top: 20px; }
        .install-link { display: inline-block; background: #dbab09; color: black; padding: 10px 15px; text-decoration: none; font-weight: bold; border-radius: 4px; margin-top: 15px; }
        #app-controls { display: none; padding: 10px; }
        .btn-ui { background: #444; color: white; border: 1px solid #666; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; width: 100%; margin-top: 5px; }
        .btn-ui:hover { background: #555; }
        .status-text { color: #dbab09; font-weight: bold; margin-top: 10px; text-align: center; }
        #settings-menu { display: none; background: #222; padding: 15px; border-radius: 5px; height: 320px; overflow-y: auto; border: 1px solid #444; text-align: left; margin-top: 10px;}
        .upload-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 8px; align-items: center; color: #ccc; font-size: 12px; }
    </style>
</head>
<body>
    
    <div class="header" id="header">
        <strong style="font-size: 16px;">Preset overlays by 7xQuest</strong>
        <div class="cog-btn" title="Settings" id="settings-btn">⚙️</div>
    </div>

    <div id="install-screen">
        <h3 style="color: #ff4444; margin-top: 0;">Installation Required</h3>
        <p style="font-size: 12px; color: #ccc;">This app must be installed in Alt1 to read your screen and draw icons.</p>
        <a href="alt1://addapp/https://osrs.us/alt1-preset-images/appconfig.json" class="install-link">Click Here to Install App</a>
    </div>

    <div id="app-controls">
        <button id="cal-btn" class="btn-ui">📌 Calibrate Bank Position</button>
        <div id="status" class="status-text">Checking permissions...</div>
    </div>

    <div id="settings-menu">
        <h3 style="margin-top:0; color:#dbab09;">Upload 30x30 Icons</h3>
        <div id="inputs"></div>
        <button class="btn-ui" style="background:#dbab09; color:black; border:none;" id="close-settings-btn">Save & Close</button>
    </div>

    <script src="./app.js?v=2"></script>
</body>
</html>
