<!DOCTYPE html>
<html>
<head>
    <title>Preset Overlays</title>
    <meta name="alt1config" content="appconfig.json">
    <script src="https://runeapps.org/alt1lib.js"></script>
    <style>
        body { background: #1a1a1a; color: #ccc; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 10px; }
        .cog-btn { cursor: pointer; color: #dbab09; font-size: 30px; user-select: none; }
        #settings-menu { display: none; background: #222; padding: 15px; border-radius: 5px; height: 300px; overflow-y: auto; border: 1px solid #444; text-align: left; }
        .upload-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 8px; align-items: center; }
        .btn-main { background: #dbab09; color: black; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; margin-bottom: 10px; }
        .status { font-size: 11px; color: #888; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <strong>Preset Overlays</strong>
        <div class="cog-btn" onclick="toggleSettings()">⚙️</div>
    </div>

    <button id="init-btn" class="btn-main" onclick="initApp()">Start App & Grant Permissions</button>
    <div id="status" class="status">App Loaded. Click Start.</div>

    <div id="settings-menu">
        <h3 style="margin-top:0; color:#dbab09;">Icon Manager</h3>
        <div id="inputs"></div>
        <button class="btn-main" onclick="toggleSettings()">Close Settings</button>
    </div>

    <script>
        // Native Alt1 library object
        const rsLib = window.a1lib;
        
        let presets = JSON.parse(localStorage.getItem("rs_preset_imgs") || "{}");
        let showSettings = false;
        let isRunning = false;

        // Populate 18 slots
        const inputContainer = document.getElementById("inputs");
        for (let i = 1; i <= 18; i++) {
            let div = document.createElement("div");
            div.className = "upload-row";
            div.innerHTML = `<span>#${i}:</span> <input type="file" accept="image/*" onchange="saveImg(${i}, this)">`;
            inputContainer.appendChild(div);
        }

        // The Handshake
        function initApp() {
            if (window.alt1) {
                // Force relative path to ensure it finds the JSON
                alt1.identifyAppUrl("./appconfig.json");
                isRunning = true;
                document.getElementById("init-btn").style.display = "none";
                document.getElementById("status").innerText = "Searching for Bank...";
                startScanning();
            } else {
                alert("Please open this inside the Alt1 Toolkit browser.");
            }
        }

        window.toggleSettings = function() {
            showSettings = !showSettings;
            document.getElementById("settings-menu").style.display = showSettings ? "block" : "none";
        };

        window.saveImg = function(num, input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                presets[num] = e.target.result;
                localStorage.setItem("rs_preset_imgs", JSON.stringify(presets));
                alert("Preset " + num + " Icon Saved!");
            };
            reader.readAsDataURL(file);
        };

        // The Engine
        function startScanning() {
            setInterval(() => {
                if (!isRunning || !window.alt1 || !alt1.permissionPixel) return;

                let img = rsLib.captureHoldFull();
                if (!img) return;
                
                // Scan for the Gold Cog (#dbab09)
                let cog = img.findColor([219, 171, 9], 20);

                if (cog.length > 0) {
                    document.getElementById("status").innerText = "Bank Active";
                    let anchor = cog[0];

                    let pagePix = img.getPixel(anchor.x - 85, anchor.y + 5);
                    let isPageTwo = (pagePix.r > 180); 
                    let offset = isPageTwo ? 10 : 1;

                    alt1.overloadOut(); 

                    for (let i = 0; i < 9; i++) {
                        let pIdx = offset + i;
                        if (presets[pIdx]) {
                            let col = i % 5;
                            let row = Math.floor(i / 5);
                            let x = anchor.x - 238 + (col * 40);
                            let y = anchor.y - 41 + (row * 40);
                            
                            alt1.overloadImg(presets[pIdx], x, y, 30, 30);
                        }
                    }
                } else {
                    document.getElementById("status").innerText = "Searching for Bank...";
                    alt1.overloadOut();
                }
            }, 400);
        }
    </script>
</body>
</html>
