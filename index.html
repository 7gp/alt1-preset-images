<!DOCTYPE html>
<html>
<head>
    <title>Preset Overlays</title>
    <script src="https://runeapps.org/alt1lib.js"></script>
    <style>
        body { background: #1a1a1a; color: #ccc; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .cog-btn { cursor: pointer; color: #dbab09; font-size: 24px; user-select: none; }
        #settings-menu { display: none; margin-top: 20px; background: #222; padding: 10px; border-radius: 5px; height: 300px; overflow-y: auto; }
        .upload-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .status { font-size: 11px; color: #888; margin-top: 10px; }
        .install-btn { background: #dbab09; color: black; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <strong>Preset Overlays</strong>
        <div class="cog-btn" onclick="toggleSettings()">⚙️</div>
    </div>

    <button class="install-btn" onclick="installApp()">Click to Finalize Install</button>
    <div id="status" class="status">Waiting for Bank...</div>

    <div id="settings-menu">
        <div id="inputs"></div>
    </div>

    <script>
        const a1lib = new Alt1lib();
        let presets = JSON.parse(localStorage.getItem("rs_preset_imgs") || "{}");
        let showSettings = false;

        // Generate the 18 slots
        const inputContainer = document.getElementById("inputs");
        for (let i = 1; i <= 18; i++) {
            let div = document.createElement("div");
            div.className = "upload-row";
            div.innerHTML = `<span>#${i}:</span> <input type="file" accept="image/*" onchange="saveImg(${i}, this)">`;
            inputContainer.appendChild(div);
        }

        function toggleSettings() {
            showSettings = !showSettings;
            document.getElementById("settings-menu").style.display = showSettings ? "block" : "none";
        }

        function installApp() {
            if (window.alt1) {
                alt1.identifyAppUrl("appconfig.json");
            } else {
                alert("Please open this inside the Alt1 Toolkit browser.");
            }
        }

        function saveImg(num, input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                presets[num] = e.target.result;
                localStorage.setItem("rs_preset_imgs", JSON.stringify(presets));
                alert("Preset " + num + " Saved!");
            };
            reader.readAsDataURL(file);
        }

        function mainLoop() {
            if (!window.alt1 || !alt1.permissionPixel) return;

            // Capture only the screen area (Performance optimized)
            let img = a1lib.captureHoldFull();
            
            // 1. Search for the Cog Color #dbab09
            let cog = img.findColor([219, 171, 9]);

            if (cog.length > 0) {
                document.getElementById("status").innerText = "Bank Detected - Overlaying...";
                let anchor = cog[0];

                // 2. Page Check: Look for pixel at specific offset where "10" or "1" text appears
                // We check if the pixel is 'white' (text color)
                let pagePix = img.getPixel(anchor.x - 85, anchor.y + 5);
                let isPageTwo = (pagePix.r > 200); 
                let offset = isPageTwo ? 10 : 1;

                alt1.overloadOut(); // Wipe existing frame

                for (let i = 0; i < 9; i++) {
                    let pIdx = offset + i;
                    if (presets[pIdx]) {
                        // Math for the 2-row Preset Grid
                        let col = i % 5;
                        let row = Math.floor(i / 5);
                        let x = anchor.x - 238 + (col * 40);
                        let y = anchor.y - 41 + (row * 40);
                        
                        alt1.overloadImg(presets[pIdx], x, y, 30, 30);
                    }
                }
            } else {
                document.getElementById("status").innerText = "Searching for Preset Menu...";
                alt1.overloadOut();
            }
        }

        setInterval(mainLoop, 500);
    </script>
</body>
</html>
